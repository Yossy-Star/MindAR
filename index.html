<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Camera Fix</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* scene full */
a-scene {
  position: fixed !important;
  width: 100vw !important;
  height: 100vh !important;
  top: 0;
  left: 0;
}

/* debug */
#debug {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  color: lime;
  z-index: 9999;
  font-size: 14px;
  padding: 10px;
  box-sizing: border-box;
  max-height: 35vh;
  overflow-y: auto;
  font-family: monospace;
}

</style>
</head>

<body>

<div id="debug">start...\n</div>

<a-scene

  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    antialias: true;
    alpha: true;
  "

  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: true;
    uiScanning: true;
    uiError: true;
    filterMinCF:0.001;
    filterBeta:0.01;
    maxTrack:1;
  "

>

<a-camera position="0 0 0"></a-camera>

<a-entity
  id="target"
  mindar-image-target="targetIndex: 0">

  <!-- 赤テスト -->
  <a-plane
    color="red"
    width="0.5"
    height="0.5"
    position="0 0 0.01">
  </a-plane>

  <!-- 画像 -->
  <a-plane
    src="image1.png"
    width="0.7"
    height="0.7"
    position="0 0 0.02"
    material="
      shader: flat;
      transparent: true;
    "
    side="double">
  </a-plane>

</a-entity>

</a-scene>

<script>

const debug = document.getElementById("debug");

function log(text){
  console.log(text);
  debug.innerHTML += text + "\n";
}

/* errors */
window.onerror = function(msg, url, line){
  log("JS ERROR");
  log(msg);
  log("line:" + line);
};

window.addEventListener("load", ()=>{
  log("window loaded");
});

const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", ()=>{
  log("scene loaded");
});

scene.addEventListener("arReady", ()=>{
  log("AR READY");
});

scene.addEventListener("arError", ()=>{
  log("AR ERROR");
});

const target = document.querySelector("#target");

target.addEventListener("targetFound", ()=>{
  log("TARGET FOUND");
});

target.addEventListener("targetLost", ()=>{
  log("TARGET LOST");
});

</script>

</body>
</html>
