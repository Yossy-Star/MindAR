<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Debug</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1;
}

a-scene canvas {
  background: transparent !important;
}

/* ログ表示 */
#log {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 35vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.7);
  color: #00ff88;
  font-family: monospace;
  font-size: 12px;
  padding: 8px 10px;
  z-index: 9999;
  pointer-events: none;
}

/* clear button */
#log-clear {
  position: fixed;
  right: 10px;
  bottom: 10px;
  z-index: 10000;
  background: rgba(0,0,0,0.6);
  color: #cccccc;
  border: 1px solid #666;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
}

/* ==============================
   スクリーンショットボタン
============================== */
#ss-btn {
  position: fixed;
  left: 10px;
  bottom: 10px;
  z-index: 10000;
  background: rgba(0, 0, 0, 0.65);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  font-family: monospace;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
#ss-btn:active {
  background: rgba(255,255,255,0.15);
}
#ss-btn:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ==============================
   カウントダウンオーバーレイ
============================== */
#ss-countdown {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20000;
  align-items: center;
  justify-content: center;
  /* 完全透明 — カウントダウン数字だけ浮かせる */
  background: transparent;
  pointer-events: none;
}
#ss-countdown.active {
  display: flex;
}
#ss-countdown-num {
  font-size: clamp(80px, 25vw, 160px);
  font-family: monospace;
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 0 20px rgba(0,0,0,0.8),
    0 2px 6px rgba(0,0,0,0.9);
  line-height: 1;
  animation: ss-pop 0.4s ease-out;
}
@keyframes ss-pop {
  0%   { transform: scale(1.6); opacity: 0; }
  60%  { transform: scale(0.95); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ==============================
   フラッシュエフェクト
============================== */
#ss-flash {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 30000;
  background: #fff;
  pointer-events: none;
}
#ss-flash.active {
  display: block;
  animation: ss-flash-anim 0.35s ease-out forwards;
}
@keyframes ss-flash-anim {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<!-- log -->
<div id="log"></div>

<!-- ボタン群 -->
<button
  id="log-clear"
  onclick="document.getElementById('log').innerHTML=''">
  clear
</button>

<button id="ss-btn">📷 3秒後SS</button>

<!-- カウントダウン -->
<div id="ss-countdown">
  <div id="ss-countdown-num">3</div>
</div>

<!-- フラッシュ -->
<div id="ss-flash"></div>


<a-scene

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    antialias: true;
    alpha: true;
    preserveDrawingBuffer: true;
  "

  mindar-image="
    imageTargetSrc: ./targets.mind;
    autoStart: true;
    uiLoading: true;
    uiScanning: true;
    uiError: true;
    filterMinCF: 0.1;
    filterBeta: 10;
    missTolerance: 5;
    warmupTolerance: 3;
    maxTrack: 1;
  "

  embedded
>

  <a-assets>
    <img
      id="myImage"
      src="./image1.png"
      crossorigin="anonymous">
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0"
    smooth-transform="alpha: 0.4">

    <a-plane
      src="#myImage"
      width="0.7"
      height="0.7"
      position="0 0 0.02"
      side="double"
      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.5;
      ">
    </a-plane>

  </a-entity>

</a-scene>

<script>

/* =========================
   smooth-transform コンポーネント
========================= */
AFRAME.registerComponent("smooth-transform", {
  schema: {
    alpha: { type: "number", default: 0.4 }
  },
  init: function () {
    this.smoothPos   = new THREE.Vector3();
    this.smoothQuat  = new THREE.Quaternion();
    this.smoothScale = new THREE.Vector3(1, 1, 1);
    this.targetPos   = new THREE.Vector3();
    this.targetQuat  = new THREE.Quaternion();
    this.targetScale = new THREE.Vector3(1, 1, 1);
    this.isVisible   = false;
    const el = this.el;
    el.addEventListener("targetFound", () => {
      this.isVisible  = true;
      this.firstFrame = true;
    });
    el.addEventListener("targetLost", () => {
      this.isVisible = false;
    });
  },
  tick: function () {
    if (!this.isVisible) return;
    const obj = this.el.object3D;
    this.targetPos.copy(obj.position);
    this.targetQuat.copy(obj.quaternion);
    this.targetScale.copy(obj.scale);
    if (this.firstFrame) {
      this.smoothPos.copy(this.targetPos);
      this.smoothQuat.copy(this.targetQuat);
      this.smoothScale.copy(this.targetScale);
      this.firstFrame = false;
      return;
    }
    const a = this.data.alpha;
    this.smoothPos.lerp(this.targetPos, a);
    this.smoothQuat.slerp(this.targetQuat, a);
    this.smoothScale.lerp(this.targetScale, a);
    obj.position.copy(this.smoothPos);
    obj.quaternion.copy(this.smoothQuat);
    obj.scale.copy(this.smoothScale);
  }
});

/* =========================
   renderer 背景を透明化
========================= */
function fixRendererBackground() {
  const sceneEl = document.querySelector("a-scene");
  if (!sceneEl || !sceneEl.renderer) return;
  sceneEl.renderer.setClearColor(0x000000, 0);
  sceneEl.renderer.setClearAlpha(0);
  log("renderer background cleared", "#88ffcc");
}

/* =========================
   log
========================= */
const logEl = document.getElementById("log");

function log(msg, color) {
  const time = new Date().toTimeString().slice(0, 8);
  const line = document.createElement("div");
  line.style.color = color || "#00ff88";
  line.textContent = "[" + time + "] " + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

/* =========================
   global js error
========================= */
window.onerror = function (msg, url, line) {
  log("JS ERROR: " + msg + " line:" + line, "#ff5555");
};

/* =========================
   window
========================= */
window.addEventListener("load", () => { log("window loaded"); });

/* =========================
   scene events
========================= */
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {
  log("scene loaded");
  fixRendererBackground();
  const canvas = scene.querySelector("canvas");
  if (canvas) {
    canvas.style.background = "transparent";
    log("canvas style set transparent");
  }
});

scene.addEventListener("arReady", () => {
  log("AR READY", "#88ffcc");
  fixRendererBackground();
});

scene.addEventListener("arError", () => {
  log("AR ERROR", "#ff5555");
});

/* =========================
   target events
========================= */
const target = document.querySelector("#target");

target.addEventListener("targetFound", () => {
  log("TARGET FOUND ✓", "#ffdd55");
});

target.addEventListener("targetLost", () => {
  log("TARGET LOST", "#aaaaaa");
});

/* =========================
   image events
========================= */
const image = document.querySelector("#myImage");

image.addEventListener("load",  () => { log("image1.png loaded"); });
image.addEventListener("error", () => { log("image1.png ERROR", "#ff5555"); });

/* =========================
   targets.mind check
========================= */
fetch("./targets.mind")
  .then(r => {
    if (r.ok) {
      log("targets.mind OK");
    } else {
      log("targets.mind ERROR " + r.status, "#ff5555");
    }
  })
  .catch(() => {
    log("targets.mind fetch failed", "#ff5555");
  });


/* ============================================================
   📷 スクリーンショット機能

   ★ 核心的な修正点 ★
   WebGLはデフォルトでフレーム末尾にバッファをクリアするため、
   非同期で drawImage しても空になってしまう。

   解決策:
   A-Frameレンダラーの「render直後」= WebGLバッファがまだ生きている
   タイミングを onAfterRender フックで捕まえ、その瞬間に同期的に
   toDataURL() を呼ぶ。videoも同じタイミングで合成することで
   カメラ映像 + AR描画を正しく合成できる。
============================================================ */

const ssBtn       = document.getElementById("ss-btn");
const ssCountdown = document.getElementById("ss-countdown");
const ssNum       = document.getElementById("ss-countdown-num");
const ssFlash     = document.getElementById("ss-flash");

/** UIとして非表示にしたい要素セレクター */
const UI_SELECTORS = [
  "#log",
  "#log-clear",
  "#ss-btn",
];

/** UIを一括で隠す / 戻す */
function setUIVisible(visible) {
  UI_SELECTORS.forEach(sel => {
    const el = document.querySelector(sel);
    if (el) el.style.visibility = visible ? "visible" : "hidden";
  });
}

/**
 * A-Frameの render 直後フックで video + WebGL canvas を合成し
 * dataURL文字列を同期的に取得して返すPromise
 */
function captureOnNextRender() {
  return new Promise((resolve, reject) => {

    const sceneEl  = document.querySelector("a-scene");
    const renderer = sceneEl && sceneEl.renderer;

    if (!renderer) {
      reject(new Error("renderer not ready"));
      return;
    }

    // Three.js renderer の onAfterRender は存在しないので
    // scene の render イベント、または requestAnimationFrame を利用する。
    // A-Frame は毎フレーム sceneEl に "renderstart" は無いため
    // THREE.WebGLRenderer の render をラップする方式を使う。

    const originalRender = renderer.render.bind(renderer);

    renderer.render = function(scene3, camera) {

      // 元の render を呼ぶ → この瞬間 WebGL バッファに描画される
      originalRender(scene3, camera);

      // フックを即座に外す（1フレームだけ）
      renderer.render = originalRender;

      // --- バッファが生きているうちに合成キャプチャ ---
      try {
        const W = window.innerWidth;
        const H = window.innerHeight;

        const composite = document.createElement("canvas");
        composite.width  = W;
        composite.height = H;
        const ctx = composite.getContext("2d");

        // Step1: video（カメラ映像）を object-fit:cover で描画
        const video = document.querySelector("video");
        if (video && video.readyState >= 2) {
          const vW = video.videoWidth;
          const vH = video.videoHeight;
          const scale = Math.max(W / vW, H / vH);
          const dw = vW * scale;
          const dh = vH * scale;
          const dx = (W - dw) / 2;
          const dy = (H - dh) / 2;
          ctx.drawImage(video, dx, dy, dw, dh);
        }

        // Step2: WebGL canvas（AR描画）を重ねる
        //        renderer.render() の直後なのでバッファが確実に存在する
        const glCanvas = renderer.domElement;
        ctx.drawImage(glCanvas, 0, 0, W, H);

        // Step3: dataURL取得（同期）→ Blob変換
        composite.toBlob(blob => {
          if (blob) resolve(blob);
          else      reject(new Error("toBlob returned null"));
        }, "image/png");

      } catch (err) {
        reject(err);
      }
    };
  });
}

/** BlobをPNGファイルとしてダウンロード */
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href     = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

/** フラッシュ演出 */
function doFlash() {
  return new Promise(resolve => {
    ssFlash.classList.remove("active");
    void ssFlash.offsetWidth; // reflow
    ssFlash.classList.add("active");
    ssFlash.addEventListener("animationend", () => {
      ssFlash.classList.remove("active");
      resolve();
    }, { once: true });
  });
}

/** カウントダウン */
function countdown(seconds) {
  return new Promise(resolve => {

    ssNum.textContent = seconds;
    ssCountdown.classList.add("active");

    let remaining = seconds;

    const tick = () => {
      remaining--;
      if (remaining <= 0) {
        ssCountdown.classList.remove("active");
        resolve();
        return;
      }
      ssNum.textContent = remaining;
      ssNum.style.animation = "none";
      void ssNum.offsetWidth;
      ssNum.style.animation = "";
      setTimeout(tick, 1000);
    };

    setTimeout(tick, 1000);
  });
}

/** メイン処理 */
async function takeScreenshot() {

  ssBtn.disabled = true;
  log("SS: countdown start", "#88ccff");

  /* 1. UIを隠す */
  setUIVisible(false);

  /* 2. 3秒カウントダウン */
  await countdown(3);

  /* 3. renderフックを仕込んでおく（次のrenderフレームでキャプチャ） */
  try {
    const [blob] = await Promise.all([
      captureOnNextRender(),   // ← renderフック内で同期取得
      doFlash()
    ]);

    /* 4. ファイル名: screenshot_YYYYMMDD_HHmmss.png */
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    const filename =
      "screenshot_"
      + now.getFullYear()
      + pad(now.getMonth() + 1)
      + pad(now.getDate())
      + "_"
      + pad(now.getHours())
      + pad(now.getMinutes())
      + pad(now.getSeconds())
      + ".png";

    downloadBlob(blob, filename);
    log("SS: saved → " + filename, "#ffdd55");

  } catch (err) {
    log("SS: capture failed — " + err.message, "#ff5555");
    // フックが残ったままにならないよう念のためリセット
    const sceneEl = document.querySelector("a-scene");
    if (sceneEl && sceneEl.renderer) {
      // renderer.renderはすでに元に戻っているはずだが安全のため確認
    }
  }

  /* 5. UIを再表示 */
  setUIVisible(true);
  ssBtn.disabled = false;
}

ssBtn.addEventListener("click", takeScreenshot);

</script>

</body>
</html>
