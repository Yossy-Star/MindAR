<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Camera Restore</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;

    width: 100%;
    height: 100%;

    background: black;

    font-family: sans-serif;
  }

  /* scene */
  a-scene {
    position: fixed !important;

    top: 0;
    left: 0;

    width: 100vw !important;
    height: 100vh !important;
  }

  /* canvas */
  canvas {
    position: fixed;

    top: 0;
    left: 0;

    width: 100vw !important;
    height: 100vh !important;
  }

  /* debug */
  #debug {
    position: fixed;

    top: 0;
    left: 0;

    width: 100%;

    background: rgba(0,0,0,0.7);

    color: lime;

    padding: 10px;

    z-index: 9999;

    font-size: 14px;

    white-space: pre-wrap;

    max-height: 35vh;

    overflow-y: auto;

    box-sizing: border-box;
  }
</style>
</head>

<body>

<!-- debug -->
<div id="debug">起動開始...\n</div>

<a-scene

  color-space="sRGB"

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  mindar-image="
    imageTargetSrc: targets.mind;

    autoStart: true;

    uiLoading: true;
    uiScanning: true;
    uiError: true;

    maxTrack: 1;
  "
>

  <!-- assets -->
  <a-assets>

    <img
      id="img1"
      src="image1.jpg">

  </a-assets>

  <!-- camera -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- target -->
  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0">

    <!-- red test plane -->
    <a-plane
      id="redPlane"

      color="red"

      position="0 0 0"

      width="0.5"
      height="0.5"

      side="double">
    </a-plane>

    <!-- image -->
    <a-plane
      id="imagePlane"

      src="#img1"

      position="0 0 0.01"

      width="0.7"
      height="0.7"

      material="
        shader: flat;
      "

      side="double">
    </a-plane>

  </a-entity>

</a-scene>

<script>

const debug = document.getElementById("debug");

function log(text){
  console.log(text);
  debug.innerHTML += text + "\n";
}

/* JS error */
window.onerror = function(msg, url, line){
  log("===== JS ERROR =====");
  log(msg);
  log("line: " + line);
};

/* page load */
window.addEventListener("load", () => {
  log("window loaded");
});

/* scene */
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {
  log("A-Frame loaded");
});

/* AR ready */
scene.addEventListener("arReady", () => {
  log("AR READY");
});

/* AR error */
scene.addEventListener("arError", () => {
  log("AR ERROR");
});

/* target */
const target = document.querySelector("#target");

target.addEventListener("targetFound", () => {
  log("TARGET FOUND");
});

target.addEventListener("targetLost", () => {
  log("TARGET LOST");
});

/* image check */
const img = new Image();

img.onload = () => {
  log("image1.jpg loaded OK");
};

img.onerror = () => {
  log("image1.jpg FAILED");
};

img.src = "image1.jpg";

</script>

</body>
</html>
