<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Final Test</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html, body {
  margin: 0;
  padding: 0;

  width: 100%;
  height: 100%;

  overflow: hidden;

  background: black;
}

a-scene {
  position: fixed !important;

  top: 0;
  left: 0;

  width: 100vw !important;
  height: 100vh !important;
}

/* START BUTTON */

#startButton {

  position: fixed;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  z-index: 10000;

  font-size: 24px;

  padding: 18px 36px;

  border: none;

  border-radius: 10px;

  background: rgba(0,0,0,0.8);

  color: white;
}

/* LOG */

#log {

  position: fixed;

  bottom: 0;
  left: 0;

  width: 100%;
  max-height: 35vh;

  overflow-y: auto;

  background: rgba(0,0,0,0.7);

  color: #00ff88;

  font-family: monospace;
  font-size: 12px;

  padding: 8px 10px;

  box-sizing: border-box;

  z-index: 9999;

  pointer-events: none;
}

</style>
</head>

<body>

<button id="startButton">
START AR
</button>

<div id="log"></div>

<a-scene

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    antialias: true;
  "

  mindar-image="
    imageTargetSrc: ./targets.mind;

    autoStart: false;

    uiLoading: true;
    uiScanning: true;
    uiError: true;

    filterMinCF: 0.001;
    filterBeta: 0.01;

    maxTrack: 1;
  "

>

  <!-- assets -->

  <a-assets>

    <img
      id="myImage"
      src="./image1.png"
      crossorigin="anonymous">

  </a-assets>

  <!-- target -->

  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0">

    <a-plane

      src="#myImage"

      width="0.7"
      height="0.7"

      position="0 0 0.02"

      side="double"

      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.01;
        depthWrite: false;
      ">

    </a-plane>

  </a-entity>

</a-scene>

<script>

/* =========================
   LOG
========================= */

const logEl =
document.getElementById("log");

function log(msg, color){

  const time =
    new Date()
    .toTimeString()
    .slice(0,8);

  const line =
    document.createElement("div");

  line.style.color =
    color || "#00ff88";

  line.textContent =
    "[" + time + "] " + msg;

  logEl.appendChild(line);

  logEl.scrollTop =
    logEl.scrollHeight;

  console.log(msg);
}

/* =========================
   ERROR
========================= */

window.onerror =
function(msg, url, line){

  log(
    "JS ERROR: "
    + msg
    + " line:"
    + line,
    "#ff5555"
  );
};

/* =========================
   LOAD
========================= */

window.addEventListener(
  "load",
  ()=>{

    log("window loaded");

  }
);

/* =========================
   SCENE
========================= */

const scene =
document.querySelector("a-scene");

scene.addEventListener(
  "loaded",
  ()=>{

    log("scene loaded");

  }
);

scene.addEventListener(
  "arReady",
  ()=>{

    log(
      "AR READY",
      "#88ffcc"
    );

  }
);

scene.addEventListener(
  "arError",
  ()=>{

    log(
      "AR ERROR",
      "#ff5555"
    );

  }
);

/* =========================
   TARGET
========================= */

const target =
document.querySelector("#target");

target.addEventListener(
  "targetFound",
  ()=>{

    log(
      "TARGET FOUND ✓",
      "#ffdd55"
    );

  }
);

target.addEventListener(
  "targetLost",
  ()=>{

    log(
      "TARGET LOST",
      "#aaaaaa"
    );

  }
);

/* =========================
   IMAGE
========================= */

const image =
document.querySelector("#myImage");

image.addEventListener(
  "load",
  ()=>{

    log(
      "image1.png loaded"
    );

  }
);

image.addEventListener(
  "error",
  ()=>{

    log(
      "image1.png ERROR",
      "#ff5555"
    );

  }
);

/* =========================
   TARGETS
========================= */

fetch("./targets.mind")

.then(response=>{

  if(response.ok){

    log(
      "targets.mind OK"
    );

  }else{

    log(
      "targets.mind ERROR "
      + response.status,
      "#ff5555"
    );

  }

})

.catch(error=>{

  log(
    "targets.mind fetch failed",
    "#ff5555"
  );

});

/* =========================
   START BUTTON
========================= */

document
.getElementById("startButton")
.addEventListener(
  "click",
  async ()=>{

    log("START BUTTON CLICKED");

    try{

      const mindarSystem =
        scene.systems["mindar-image-system"];

      await mindarSystem.start();

      log(
        "mindarSystem.start() OK",
        "#88ffcc"
      );

      document
      .getElementById("startButton")
      .style.display = "none";

    }catch(e){

      log(
        "START ERROR: "
        + e,
        "#ff5555"
      );

    }

  }
);

</script>

</body>
</html>
