<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no">

  <title>MindAR Fast Version</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
      font-family: sans-serif;
    }

    canvas {
      position: fixed !important;
      top: 0;
      left: 0;
    }

    /* MindARの標準UIを完全非表示 */
    .mindar-ui-loading,
    .mindar-ui-error,
    .mindar-ui-scanning {
      display: none !important;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: false;
    uiScanning: false;
    uiError: false;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    maxTrack: 1;
  "

  embedded
  color-space="sRGB"

  renderer="
    colorManagement: true;
    physicallyCorrectLights: false;
    logarithmicDepthBuffer: true;
    precision: mediump;
  "

  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- Assets -->
  <a-assets timeout="10000">

    <!-- 表示画像 -->
    <img
      id="card"
      src="image1.png">

  </a-assets>

  <!-- Camera -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- ターゲット -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- AR画像 -->
    <a-plane
      src="#card"

      position="0 0 0"

      width="1"
      height="1"

      material="
        transparent: true;
        shader: flat;
        side: double;
      ">
    </a-plane>

  </a-entity>

</a-scene>

</body>
</html>
