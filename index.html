<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MindAR Sample</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;
                 autoStart: true;
                 uiScanning: true;
                 uiLoading: false;
                 uiError: true;
                 filterMinCF:0.0001;
                 filterBeta: 0.001;"
  color-space="sRGB"
  renderer="colorManagement: true;
            physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <img id="card" src="image1.png">
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- targetIndex: 0 -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-plane
      src="#card"
      position="0 0 0"
      height="1"
      width="1"
      material="transparent: true;"
      side="double">
    </a-plane>

  </a-entity>

</a-scene>

</body>
</html>
