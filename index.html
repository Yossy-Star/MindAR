<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MindAR Debug Stable</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
  }

  #debug {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    color: lime;
    padding: 10px;
    z-index: 9999;
    font-size: 14px;
    white-space: pre-wrap;
    max-height: 40vh;
    overflow-y: auto;
  }
</style>
</head>

<body>

<!-- デバッグ表示 -->
<div id="debug">起動開始...\n</div>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: true;
    uiScanning: true;
    uiError: true;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    maxTrack: 1;
  "
  color-space="sRGB"
  renderer="colorManagement: true; logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <!-- カメラ -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- 認識ターゲット -->
  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0">

    <!-- まず赤い板を表示 -->
    <a-plane
      id="testPlane"
      color="red"
      position="0 0 0.01"
      width="0.5"
      height="0.5"
      side="double">
    </a-plane>

    <!-- image1.png -->
    <a-plane
      id="imagePlane"
      src="image1.png"
      position="0 0 0.02"
      width="0.7"
      height="0.7"
      material="shader: flat; transparent: true;"
      side="double">
    </a-plane>

  </a-entity>

</a-scene>

<script>

const debug = document.getElementById("debug");

function log(text){
  console.log(text);
  debug.innerHTML += text + "\n";
}

/* JSエラー */
window.onerror = function(msg, url, line, col, error){
  log("===== JS ERROR =====");
  log(msg);
  log("line: " + line);
};

/* ページロード */
window.addEventListener("load", () => {
  log("window loaded");
});

/* Scene */
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {
  log("A-Frame loaded");
});

/* MindAR ready */
scene.addEventListener("arReady", () => {
  log("AR READY");
});

/* MindAR error */
scene.addEventListener("arError", () => {
  log("AR ERROR");
});

/* ターゲット */
const target = document.querySelector("#target");

target.addEventListener("targetFound", () => {
  log("TARGET FOUND");
});

target.addEventListener("targetLost", () => {
  log("TARGET LOST");
});

/* image確認 */
const img = new Image();

img.onload = () => {
  log("image1.png loaded OK");
};

img.onerror = () => {
  log("image1.png FAILED");
};

img.src = "image1.png";

</script>

</body>
</html>
