<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Debug</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  /* ★ background: black を削除 → 透明に */
  background: transparent;
}

/* ★ MindARが生成するビデオ要素を確実に最背面に表示 */
video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  /* ★ z-indexをビデオより上に */
  z-index: 1;
}

/* ★ A-FrameのcanvasをCSSで透明化 */
a-scene canvas {
  background: transparent !important;
}

/* ログ表示 */
#log {
  position: fixed;
  bottom: 0;
  left: 0;

  width: 100%;
  max-height: 35vh;

  overflow-y: auto;

  background: rgba(0,0,0,0.7);

  color: #00ff88;

  font-family: monospace;
  font-size: 12px;

  padding: 8px 10px;

  z-index: 9999;

  pointer-events: none;
}

/* clear button */
#log-clear {
  position: fixed;
  right: 10px;
  bottom: 10px;

  z-index: 10000;

  background: rgba(0,0,0,0.6);
  color: #cccccc;

  border: 1px solid #666;
  border-radius: 4px;

  padding: 4px 8px;

  font-size: 11px;

  cursor: pointer;
}
</style>
</head>

<body>

<!-- log -->
<div id="log"></div>

<button
  id="log-clear"
  onclick="document.getElementById('log').innerHTML=''">
  clear
</button>

<a-scene

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    antialias: true;
    alpha: true;
  "

  mindar-image="
    imageTargetSrc: ./targets.mind;

    autoStart: true;

    uiLoading: true;
    uiScanning: true;
    uiError: true;

    filterMinCF: 0.1;
    filterBeta: 10;

    missTolerance: 5;
    warmupTolerance: 3;

    maxTrack: 1;
  "

  embedded

>

  <!-- assets -->
  <a-assets>

    <img
      id="image1"
      src="./image1.png"
      crossorigin="anonymous">

    <img
      id="image2"
      src="./image2.png"
      crossorigin="anonymous">

    <img
      id="image3"
      src="./image3.png"
      crossorigin="anonymous">

  </a-assets>

  <!-- camera -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- target -->
  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0"
    smooth-transform="alpha: 0.4">

    <!--
      半円配置（半径1.2、上方向、-30° / 0° / +30°）
      各パネルはターゲット中心を向くようrotation Y を設定

      angle  x = 1.2*sin(angle)  y = 1.2*cos(angle)
      -30°   x = -0.60           y =  1.04
        0°   x =  0.00           y =  1.20
      +30°   x =  0.60           y =  1.04
    -->

    <!-- image1 : 左 -30° -->
    <a-plane
      id="plane1"
      src="#image1"
      width="0.7"
      height="0.7"
      position="-0.60 1.04 0"
      rotation="0 -30 0"
      side="double"
      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.5;
      ">
    </a-plane>

    <!-- image2 : 中央 0° -->
    <a-plane
      id="plane2"
      src="#image2"
      width="0.7"
      height="0.7"
      position="0 1.20 0"
      rotation="0 0 0"
      side="double"
      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.5;
      ">
    </a-plane>

    <!-- image3 : 右 +30° -->
    <a-plane
      id="plane3"
      src="#image3"
      width="0.7"
      height="0.7"
      position="0.60 1.04 0"
      rotation="0 30 0"
      side="double"
      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.5;
      ">
    </a-plane>

  </a-entity>

</a-scene>

<script>

/* =========================
   ★ smooth-transform コンポーネント
   　 カメラを速く動かしたときの
   　 ガタつきを線形補間で緩和する
========================= */

AFRAME.registerComponent("smooth-transform", {

  schema: {
    // 補間係数: 0に近いほど滑らか(遅延大)
    //           1に近いほど即時追従
    alpha: { type: "number", default: 0.4 }
  },

  init: function () {

    this.smoothPos = new THREE.Vector3();
    this.smoothQuat = new THREE.Quaternion();
    this.smoothScale = new THREE.Vector3(1, 1, 1);

    this.targetPos  = new THREE.Vector3();
    this.targetQuat = new THREE.Quaternion();
    this.targetScale = new THREE.Vector3(1, 1, 1);

    this.isVisible = false;

    const el = this.el;

    el.addEventListener("targetFound", () => {
      this.isVisible = true;
      // 初回はいきなり追従させてポップを防ぐ
      this.firstFrame = true;
    });

    el.addEventListener("targetLost", () => {
      this.isVisible = false;
    });
  },

  tick: function () {

    if (!this.isVisible) return;

    const obj = this.el.object3D;

    // 現在のThree.jsトランスフォームを取得
    this.targetPos.copy(obj.position);
    this.targetQuat.copy(obj.quaternion);
    this.targetScale.copy(obj.scale);

    if (this.firstFrame) {
      // 初フレームはスナップ
      this.smoothPos.copy(this.targetPos);
      this.smoothQuat.copy(this.targetQuat);
      this.smoothScale.copy(this.targetScale);
      this.firstFrame = false;
      return;
    }

    const a = this.data.alpha;

    // 位置・回転・スケールを線形補間
    this.smoothPos.lerp(this.targetPos, a);
    this.smoothQuat.slerp(this.targetQuat, a);
    this.smoothScale.lerp(this.targetScale, a);

    obj.position.copy(this.smoothPos);
    obj.quaternion.copy(this.smoothQuat);
    obj.scale.copy(this.smoothScale);
  }

});

/* =========================
   ★ Three.js renderer の背景を透明化
   （A-Frame の scene loaded 後に実行）
========================= */

function fixRendererBackground() {

  const sceneEl = document.querySelector("a-scene");

  if (!sceneEl || !sceneEl.renderer) return;

  // Three.js rendererの背景色をnullに（透明）
  sceneEl.renderer.setClearColor(0x000000, 0);
  sceneEl.renderer.setClearAlpha(0);

  log("renderer background cleared", "#88ffcc");
}

/* =========================
   log
========================= */

const logEl = document.getElementById("log");

function log(msg, color){

  const time = new Date()
    .toTimeString()
    .slice(0,8);

  const line = document.createElement("div");

  line.style.color = color || "#00ff88";

  line.textContent =
    "[" + time + "] " + msg;

  logEl.appendChild(line);

  logEl.scrollTop =
    logEl.scrollHeight;

  console.log(msg);
}

/* =========================
   global js error
========================= */

window.onerror =
function(msg, url, line){

  log(
    "JS ERROR: "
    + msg
    + " line:"
    + line,
    "#ff5555"
  );
};

/* =========================
   window
========================= */

window.addEventListener(
  "load",
  ()=>{

    log("window loaded");

  }
);

/* =========================
   scene
========================= */

const scene =
document.querySelector("a-scene");

scene.addEventListener(
  "loaded",
  ()=>{

    log("scene loaded");

    // ★ scene読み込み後にrendererの背景を透明化
    fixRendererBackground();

    // ★ canvasのCSSも念のため上書き
    const canvas = scene.querySelector("canvas");
    if(canvas){
      canvas.style.background = "transparent";
      log("canvas style set transparent");
    }

  }
);

scene.addEventListener(
  "arReady",
  ()=>{

    log(
      "AR READY",
      "#88ffcc"
    );

    // ★ arReady後にも再適用（MindARが上書きする場合に備えて）
    fixRendererBackground();

  }
);

scene.addEventListener(
  "arError",
  ()=>{

    log(
      "AR ERROR",
      "#ff5555"
    );

  }
);

/* =========================
   target
========================= */

const target =
document.querySelector("#target");

target.addEventListener(
  "targetFound",
  ()=>{

    log(
      "TARGET FOUND ✓",
      "#ffdd55"
    );

  }
);

target.addEventListener(
  "targetLost",
  ()=>{

    log(
      "TARGET LOST",
      "#aaaaaa"
    );

  }
);

/* =========================
   image load check (3枚)
========================= */

["image1","image2","image3"].forEach(id => {

  const el = document.getElementById(id);

  if(!el) return;

  el.addEventListener("load", () => {
    log(id + ".png loaded");
  });

  el.addEventListener("error", () => {
    log(id + ".png ERROR", "#ff5555");
  });

});

/* =========================
   targets.mind check
========================= */

fetch("./targets.mind")

.then(response=>{

  if(response.ok){

    log(
      "targets.mind OK"
    );

  }else{

    log(
      "targets.mind ERROR "
      + response.status,
      "#ff5555"
    );

  }

})

.catch(error=>{

  log(
    "targets.mind fetch failed",
    "#ff5555"
  );

});

</script>

</body>
</html>
